<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    .menu {
      background: rgba(28, 28, 28, 0.97);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      padding: 4px 0;
    }

    .menu-item {
      display: block;
      width: 100%;
      padding: 8px 16px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      border: none;
      background: transparent;
      text-align: left;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .menu-sep {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="menu">
    <button class="menu-item" id="btnSettings"></button>
    <div class="menu-sep"></div>
    <button class="menu-item" id="btnExit"></button>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    ipcRenderer.invoke('context-menu-labels').then(({ settings, exit }) => {
      document.getElementById('btnSettings').textContent = settings
      document.getElementById('btnExit').textContent = exit
    })

    document.getElementById('btnSettings').addEventListener('click', () => {
      ipcRenderer.send('context-menu-action', 'settings')
    })

    document.getElementById('btnExit').addEventListener('click', () => {
      ipcRenderer.send('context-menu-action', 'exit')
    })

    window.addEventListener('blur', () => {
      ipcRenderer.send('context-menu-close')
    })
  </script>
</body>
</html>
